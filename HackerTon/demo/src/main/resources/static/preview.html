<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재밌는 수강신청 - 랭킹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header class="topbar">
        <div class="brand">
            <div class="circle"></div>
            <strong>세종대학교</strong>
        </div>

        <nav class="top-menu">
            <span>랭킹조회 <i class="arrow-down"></i></span>
            <span>학생서비스 <i class="arrow-down"></i></span>
        </nav>

        <div class="user-area">
            <div class="circle small"></div>
            <strong>000님</strong>
            <strong>KOR <i class="arrow-down"></i></strong>
            <div class="circle small"></div>
        </div>
    </header>

    <div class="content">

        <aside class="sidebar">
            <div class="side-item">학적 / 졸업</div>
            <div class="side-item">수업 / 성적</div>
            <div class="side-item">강좌조회 및 수강신청</div>
            <div class="side-sub">수강신청</div>
            <div class="side-sub active">랭킹조회</div>
            <div class="side-sub">기록확인</div>
            <div class="side-sub">게임설명</div>
        </aside>

        <main class="main">

            <h1>수강신청 랭킹</h1>

            <div class="tabs">
                <span class="active-tab">전체 랭킹</span>
                <span>내 기록</span>
                <span>난이도별 랭킹</span>
            </div>

            <section class="search-box">
                <select id="difficultyFilter">
                    <option value="all">전체 난이도</option>
                    <option value="easy">Easy</option>
                    <option value="normal">Normal</option>
                    <option value="hard">Hard</option>
                </select>

                <input type="text" id="nameSearch" placeholder="닉네임 검색">

                <button class="search-btn" id="rankingSearchBtn">검색</button>
            </section>

            <section class="section">
                <h2><span class="dot"></span>TOP 랭킹</h2>

                <table>
                    <thead>
                    <tr>
                        <th>순위</th>
                        <th>닉네임</th>
                        <th>클리어 시간</th>
                        <th>난이도</th>
                        <th>신청 과목 수</th>
                        <th>등록일</th>
                    </tr>
                    </thead>

                    <tbody id="rankingTable">
                    <tr>
                        <td>1</td>
                        <td>수강신청장인</td>
                        <td>18.42초</td>
                        <td>Hard</td>
                        <td>6</td>
                        <td>2026-05-16</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>올클기원</td>
                        <td>21.08초</td>
                        <td>Normal</td>
                        <td>6</td>
                        <td>2026-05-16</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>재조회금지</td>
                        <td>24.71초</td>
                        <td>Normal</td>
                        <td>6</td>
                        <td>2026-05-16</td>
                    </tr>
                    </tbody>
                </table>
            </section>

            <div class="game-panel">
                <button onclick="location.href='index.html'">게임 화면으로</button>
                <button id="refreshBtn">랭킹 새로고침</button>
            </div>

        </main>
    </div>
</div>

</body>
</html>
